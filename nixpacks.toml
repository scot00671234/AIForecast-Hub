# NIXPACKS NODE.JS ONLY - NO WEB SERVER AUTO-DETECTION
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"
NIXPACKS_NO_DEFAULT_CACHE_MOUNT = "1"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = ["npm ci --only=production"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

[start]
cmd = "npm start"