# Clean Production Setup - Fixed build artifacts issue
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "5000"

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "rm -rf dist server/public public",
  "vite build",
  "mkdir -p server/public",
  "cp -r dist/public/* server/public/"
]

[start]
cmd = "cd /app && NODE_ENV=production tsx server/production.ts"