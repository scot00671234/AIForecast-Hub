# Force ONLY Node.js - NO web servers
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "80"
HOST = "0.0.0.0"
NIXPACKS_NO_CADDY = "true"
NIXPACKS_NO_WEB_SERVER = "true"

[providers.node]
version = "20"

[phases.install]
cmds = ["npm ci --only=production"]

[phases.build] 
cmds = [
  "npm run build"
]

[start]
cmd = "node production-start.js"