# Production configuration - CADDY DISABLED for direct serving
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"

# Disable Caddy completely - Direct Node.js serving
[providers.node]
skipCaddy = true

[phases.install]
cmds = ["npm ci --production=false"]

[phases.build]
cmds = [
  "echo 'NO CADDY: Direct Node.js serving at $(date)'",
  "rm -rf dist server/public .vite",
  "echo 'Cleaned build directories'",
  "npm run build",
  "node fix-build.js",
  "echo 'Build completed - no reverse proxy caching at $(date)'"
]

[start]
cmd = "PORT=3000 HOST=0.0.0.0 node production-start.js"