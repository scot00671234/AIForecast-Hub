# Optimized Production Setup - Minimal Disk Usage
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"

[phases.setup]
nixPkgs = ["nodejs_18", "openssl"]

[phases.install]
cmds = [
  "npm ci --production=false --no-audit --no-fund",
  "npm cache clean --force"
]

[phases.build]
cmds = [
  "NODE_ENV=production npm run build",
  "rm -rf node_modules/.vite node_modules/.cache .npm",
  "npm prune --production"
]

[start]
cmd = "NODE_ENV=production node dist/index.js"