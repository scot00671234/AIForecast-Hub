# FORCE NODE.JS PROVIDER ONLY  
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"
NIXPACKS_NO_CADDY = "1"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = ["npm ci"]

[phases.build]
dependsOn = ["install"] 
cmds = ["npm run build", "npm prune --production"]

[start]
cmd = "npm start"