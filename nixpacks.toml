# Production Setup - Fixed frontend deployment issue
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "5000"

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "rm -rf dist server/public",
  "vite build",
  "mkdir -p server/public",
  "cp -r dist/public/* server/public/",
  "esbuild server/index-production.ts --platform=node --packages=external --bundle --format=esm --outdir=dist --outfile=dist/index.js"
]

[start]
cmd = "cd /app && NODE_ENV=production node dist/index.js"