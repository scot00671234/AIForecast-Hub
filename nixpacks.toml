# Clean nixpacks setup for production
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"

[phases.setup]
nixPkgs = ["nodejs_18", "openssl"]

[phases.install]
cmds = ["npm install", "npm install tsx typescript esbuild vite --save-dev"]

[phases.build]
cmds = [
  "npm run build", 
  "esbuild server/production.ts --platform=node --packages=external --bundle --format=esm --outdir=dist --target=node18"
]

[start]
cmd = "NODE_ENV=production node dist/production.js"