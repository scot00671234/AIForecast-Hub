# FORCE NODE.JS - ELIMINATE ALL WEB SERVERS
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"
# Nuclear Caddy elimination
NIXPACKS_NO_CADDY = "1"
NIXPACKS_NO_STATIC_SITE = "1"
NIXPACKS_NO_STATIC = "1"
NIXPACKS_DISABLE_STATIC = "1"
NO_STATIC_ASSETS = "1"
DISABLE_CADDY = "true"
NO_CADDY = "true"

[phases.install]
cmds = ["npm ci --production=false"]

[phases.build]
cmds = [
  "npm run build",
  "node fix-build.js"
]

[start]
cmd = "node dist/index.js"