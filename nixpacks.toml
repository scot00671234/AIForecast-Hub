# Anti-Cache Production Setup - Force Fresh Everything
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"
NIXPACKS_NO_CACHE = "1"

[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x", "openssl"]
cmds = ["echo 'Cache bust: '$(date +%s)"]

[phases.install]
cmds = [
  "rm -rf node_modules .npm",
  "npm cache clean --force",
  "npm ci"
]

[phases.build]
cmds = [
  "rm -rf dist node_modules/.vite node_modules/.cache",
  "NODE_ENV=production vite build --emptyOutDir",
  "esbuild server/production.ts --platform=node --packages=external --bundle --format=esm --outfile=dist/index.js"
]

[start]
cmd = "NODE_ENV=production node dist/index.js"