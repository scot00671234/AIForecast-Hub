providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "80"
HOST = "0.0.0.0"
NIXPACKS_NO_CADDY = "true"
NIXPACKS_NO_WEB_SERVER = "true"
NIXPACKS_NO_CACHE = "true"

[phases.install]
cmds = ["npm ci --production=false"]

[phases.build] 
cmds = [
  "echo 'BUILDING: NO WEB SERVER - Node.js only'",
  "npm run build",
  "node fix-build.js",
  "echo 'BUILD COMPLETE: Direct Node.js serving on port 80'"
]

[start]
cmd = "PORT=80 HOST=0.0.0.0 node production-start.js"