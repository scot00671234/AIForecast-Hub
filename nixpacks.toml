# Clean nixpacks setup for production
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"

[phases.setup]
nixPkgs = ["nodejs_18", "openssl"]

[phases.install]
cmds = ["npm install", "npm install tsx typescript esbuild vite --save-dev"]

[phases.build]
cmds = [
  "npm install",
  "echo 'Starting build process...'",
  "npm run build",
  "echo 'Build completed. Checking output:'",
  "ls -la dist/",
  "ls -la dist/public/ || echo 'No dist/public found'",
  "echo 'Build process finished'"
]

[start]
cmd = "npm run start"