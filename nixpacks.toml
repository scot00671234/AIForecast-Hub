# FORCE NODE.JS ONLY - BLOCK ALL WEB SERVER DETECTION
providers = ["node"]

[providers.node]
enabledBuilders = ["nodejs"]

# Explicitly disable all other providers
[providers.static]
disabled = true
[providers.deno]
disabled = true
[providers.caddy]
disabled = true

[variables]
NODE_ENV = "production"
PORT = "3000"
NIXPACKS_NO_DEFAULT_CACHE_MOUNT = "1"
NIXPACKS_NO_CADDY = "1"
NIXPACKS_DISABLE_STATIC = "1"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = ["npm ci"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build", "npm prune --production"]

[start]
cmd = "npm start"