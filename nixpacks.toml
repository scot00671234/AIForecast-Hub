# Production configuration for Dokploy VPS deployment
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"

[phases.install]
cmds = ["npm ci --production=false"]

[phases.build]
cmds = [
  "echo 'DEPLOYMENT: Starting clean build at $(date)'",
  "rm -rf dist server/public .vite",
  "echo 'Cleaned build directories'",
  "npm run build",
  "node fix-build.js",
  "echo 'Build completed successfully at $(date)'"
]

[start]
cmd = "node production-start.js"