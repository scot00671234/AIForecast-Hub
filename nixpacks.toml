# Clean Production Setup
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "5000"

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "rm -rf dist",
  "vite build",
  "esbuild server/index.ts --platform=node --packages=external --bundle --format=esm --outfile=dist/server.js"
]

[start]
cmd = "cd /app && NODE_ENV=production node dist/server.js"