# Clean Production Deployment - No Caching Issues
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "5000"

[phases.install]
# Fresh install, no cache
cmds = [
  "rm -rf dist/ server/public/ node_modules/.cache/ .vite/",
  "npm ci --no-cache"
]

[phases.build]
# Clean build process
cmds = [
  "npm run build"
]

[start]
cmd = "npm start"