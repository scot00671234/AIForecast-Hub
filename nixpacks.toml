# NUCLEAR CADDY ELIMINATION - NODE.JS ONLY
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"
NIXPACKS_NO_DEFAULT_CACHE_MOUNT = "1"
# NUCLEAR CADDY BLOCK
NIXPACKS_NO_CADDY = "1"
NIXPACKS_DISABLE_STATIC = "1"
NIXPACKS_DISABLE_CADDY = "1"
NIXPACKS_FORCE_NODE = "1"
NIXPACKS_NO_WEB_SERVER = "1"
DISABLE_CADDY = "1"
NO_CADDY = "1"
FORCE_NODE_ONLY = "1"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = ["npm ci"]

[phases.build]
dependsOn = ["install"] 
cmds = ["npm run build", "npm prune --production"]

[start]
cmd = "npm start"