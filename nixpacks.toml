# MINIMAL NODE.JS ONLY - DISABLE ALL AUTO-DETECTION  
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "5000"

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
dependsOn = ["setup"]
cmds = ["npm ci --only=production"]

[phases.build] 
dependsOn = ["install"]
cmds = ["npm run build"]

[start]
cmd = "npm start"