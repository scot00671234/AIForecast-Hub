# Production configuration for Dokploy VPS deployment
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"

[phases.install]
cmds = ["npm ci --production=false"]

[phases.build]
cmds = [
  "echo 'CACHE BUST: Emergency migration fix v3.0.0'",
  "rm -rf dist",
  "npm run build",
  "node fix-build.js",
  "echo 'Build completed with migration fixes at $(date)'"
]

[start]
cmd = "node production-start.js"