# Clean nixpacks setup for production
providers = ["node"]

[variables]
NODE_ENV = "production"
PORT = "3000"

[phases.setup]
nixPkgs = ["nodejs_18", "openssl"]

[phases.install]
cmds = ["npm install", "npm install tsx typescript esbuild vite --save-dev"]

[phases.build]
cmds = ["npm install", "npm run build"]

[start]
cmd = "npm run start"